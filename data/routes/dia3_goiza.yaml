    look_now: Begiratu gailurreriari, dorreei eta tximiniei. Pentsatu nola entrenatzen duen zure begirada goiko lerro horrek, gero katedralaren bolumenak hobeto nabaritzeko.
    photo_tip: Urrundu pixka bat eta hartu goiko aldearen erritmoa, ez sarrera bakarrik.
