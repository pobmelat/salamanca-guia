    seeing: Plaza Mayorrek ez dizu katedrala erakusten, baina bai hura posible egiten duen hiria. Espazio publikoa, erritmoa, botere zibila eta eguneroko bizitza hemen antolatzen dira.
    look_now: Gelditu erdian eta egin bira motel bat. Begiratu nola ixten den espazioa zure inguruan, eta nola prestatzen zaituen hiri trinkoago batera sartzeko.
