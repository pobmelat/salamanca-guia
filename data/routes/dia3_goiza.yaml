    blurb: Gaur ez dugu katedrala urrunetik bilatuko; hiriaren barruan nola agertzen den ikasiko dugu.
    seeing: Oraingoz ez duzu katedralaren irudi handia aurrean. Hori abantaila da. Hiri arruntetik sartuta, geroago harrizko masa monumentalak askoz indartsuago agertzen dira.
    look_now: Begiratu kaleen erritmoari, itzal luzeari eta harriak oraindik hartu ez duen distira beroari. Geroago tonu horiek guztiek beste zentzu bat hartuko dute.
    photo_tip: Ez egin oraindik gaurko argazki nagusia; gorde lehen irudi indartsua hiri monumentala irekitzen hasten denerako.
    hidden_detail: Hiri historiko bat hobeto irakurtzen da haren ertzetik sartzen zarenean, ez zuzenean postalaren erdian jausita.
