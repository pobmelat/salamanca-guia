    blurb: Gaurko helburua ez da katedrala urrunetik bilatzea, baizik eta hiriaren barruan nola agertzen den ikastea.
    seeing: Oraingoz ez duzu katedralaren masa aurrean. Hori da abiapuntu ona. Hiri arruntetik sartuta, geroago harrizko presentzia nola handitzen den askoz argiago nabarituko duzu.
    look_now: Begiratu kalearen erritmoari, itzal luzeari eta goizeko lehen argiak harrian uzten duen tonu epelari. Gaurko paseo osoa material horren irakurketan oinarrituko da.
    photo_tip: Ez egin oraindik eguneko argazki nagusia. Hobe da lehen benetako irudi indartsua katedrala hiriaren barruan irekitzen hasten denerako gordetzea.
    hidden_detail: Hiri historiko bat ulertzeko, askotan hobe da haren ertzetik sartzea zuzenean haren erdigunera jauzi egitea baino.
