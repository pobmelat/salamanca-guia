    seeing: Hemendik unibertsitatea ez da fatxada ospetsu hutsa. Katedralaren hiriaren ondoan dagoen beste indar handi bat da, eta biak elkarri neurria ematen diote.
    look_now: Begiratu lehenik patioaren espazioari, gero fatxadari, eta ondoren pentsatu katedrala oso gertu dagoela, nahiz eta oraindik ez duzun haren aurrealde handiena aurrean.
    photo_tip: Fray Luis edo patioaren zati bat sartuta, fatxadari arnasa emanez. Ez estutu gehiegi planoa.
    hidden_detail: Salamanca ulertzeko, fedearen eta jakintzaren eraikinak elkarren ondoan nola bizi diren ikustea ezinbestekoa da.
